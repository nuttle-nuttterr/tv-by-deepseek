# .github/workflows/update-playlist.yml

name: Update Tamil & English IPTV Playlist

on:
  schedule:
    # Runs every 6 hours (at minute 0 past hour 0, 6, 12, 18)
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit changes back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests m3u8

      - name: Run playlist generator
        run: python generate_playlist.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage files
        run: git add master_playlist.m3u master_playlist_backup.m3u README.md

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "CHANGED=true" >> $GITHUB_OUTPUT
          else
            echo "CHANGED=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.check.outputs.CHANGED == 'true'
        run: git commit -m "Auto-update playlist $(date +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Push changes
        if: steps.check.outputs.CHANGED == 'true'
        run: |
          git pull origin main --rebase # Ensure latest changes are pulled
          git push origin main
